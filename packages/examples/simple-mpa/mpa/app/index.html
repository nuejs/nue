
<div id="app"/>

<symbols dir="app/icon"/>

<dialog id="help" popover>
  <button popovertarget="help">x</button>
  <h2>Keyboard shortcuts</h2>

  <dl>
    <dt>Previous page</dt>  <dd><kbd>h</kbd></dd>
    <dt>Next page</dt>      <dd><kbd>l</kbd></dd>
    <dt>Previous entry</dt>  <dd><kbd>k</kbd></dd>
    <dt>Next entry</dt>      <dd><kbd>j</kbd></dd>
    <dt>Search</dt>      <dd><kbd>/</kbd></dd>
  </dl>
</dialog>
